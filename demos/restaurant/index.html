<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Critical CSS (above-fold) -->
  <style>
/* ============================================================
   RAVYAWORKS — critical.css
   Minimal above-the-fold CSS (header + hero + nav + buttons +
   reset + variables + container) loaded inline in <head> so
   the first viewport renders instantly.
   ============================================================ */

/* ---------- Reset ---------- */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  scroll-padding-top: 90px;
}

img,
picture,
svg,
video {
  display: block;
  max-width: 100%;
  height: auto;
}

a {
  color: inherit;
  text-decoration: none;
}

ul,
ol {
  list-style: none;
}

button,
input,
textarea,
select {
  font: inherit;
  color: inherit;
}

button {
  cursor: pointer;
  background: none;
  border: none;
}

/* ---------- Theming hooks ---------- */
:root {
  --color-primary: #c0392b;
  --color-primary-dark: #962d22;
  --color-primary-light: #e74c3c;
  --color-secondary: #2c3e50;
  --color-accent: #f39c12;
  --color-bg: #ffffff;
  --color-surface: #f8f9fa;
  --color-surface-alt: #fff5f2;
  --color-text: #1f2937;
  --color-text-muted: #6b7280;
  --color-text-on-primary: #ffffff;
  --font-heading: "Poppins", "Segoe UI", system-ui, sans-serif;
  --font-body: "Inter", "Segoe UI", system-ui, sans-serif;
  --container-max: 1200px;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 24px;
  --radius-pill: 999px;
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.15);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --header-height: 80px;
}

/* ---------- Base typography ---------- */
body {
  font-family: var(--font-body);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.7;
  font-size: 16px;
  overflow-x: hidden;
  max-width: 100vw;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 700;
  line-height: 1.2;
  color: var(--color-secondary);
}

h1 { font-size: clamp(2.2rem, 5vw, 3.6rem); }
h2 { font-size: clamp(1.8rem, 4vw, 2.6rem); }
h3 { font-size: clamp(1.25rem, 2.5vw, 1.6rem); }

p { color: var(--color-text-muted); }

::selection {
  background: var(--color-primary);
  color: var(--color-text-on-primary);
}

/* ---------- Utilities ---------- */
.container {
  width: 100%;
  max-width: var(--container-max);
  margin-inline: auto;
  padding-inline: 24px;
}

.section {
  padding-block: clamp(60px, 8vw, 100px);
}

.section__head {
  text-align: center;
  max-width: 680px;
  margin: 0 auto clamp(36px, 5vw, 56px);
}

.section__eyebrow {
  display: inline-block;
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--color-primary);
  margin-bottom: 12px;
}

.section__title {
  margin-bottom: 14px;
}

.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.7s var(--transition), transform 0.7s var(--transition);
}
.reveal.is-visible {
  opacity: 1;
  transform: none;
}

.text-center { text-align: center; }
.hidden { display: none !important; }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .reveal { opacity: 1; transform: none; }
}

/* ---------- Header ---------- */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: var(--header-height);
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  transition: box-shadow var(--transition), background var(--transition);
}

.site-header.is-scrolled {
  box-shadow: var(--shadow-sm);
}

.site-header__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: 1.35rem;
  color: var(--color-secondary);
  letter-spacing: -0.5px;
}

.brand__mark {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: #fff;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.main-nav ul {
  display: flex;
  align-items: center;
  gap: 4px;
}

.main-nav a {
  display: inline-block;
  padding: 10px 16px;
  font-weight: 500;
  font-size: 0.98rem;
  border-radius: var(--radius-sm);
  transition: color var(--transition), background var(--transition);
}

.main-nav a:hover {
  color: var(--color-primary);
  background: var(--color-surface);
}

.header__cta {
  margin-left: 12px;
}

.header__right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.lang-toggle {
  padding: 8px 14px;
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 0.85rem;
  border-radius: var(--radius-pill);
  background: var(--color-surface);
  color: var(--color-secondary);
  border: 1px solid rgba(0,0,0,0.1);
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
}
.lang-toggle:hover {
  background: var(--color-primary);
  color: #fff;
  border-color: var(--color-primary);
}

.nav-toggle {
  display: none;
  width: 44px;
  height: 44px;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  border-radius: var(--radius-sm);
}

.nav-toggle span {
  display: block;
  width: 24px;
  height: 2.5px;
  background: var(--color-secondary);
  border-radius: 2px;
  transition: transform var(--transition), opacity var(--transition);
}

.nav-toggle.is-open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
.nav-toggle.is-open span:nth-child(2) { opacity: 0; }
.nav-toggle.is-open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

@media (max-width: 900px) {
  .nav-toggle { display: flex; }

  .main-nav {
    position: fixed;
    top: var(--header-height);
    left: 0;
    right: 0;
    background: #fff;
    padding: 16px 24px 28px;
    box-shadow: var(--shadow);
    transform: translateY(-130%);
    transition: transform 0.35s var(--transition);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  .main-nav.is-open { transform: translateY(0); }

  .main-nav ul {
    flex-direction: column;
    align-items: stretch;
    gap: 4px;
  }

  .main-nav a {
    display: block;
    padding: 14px 12px;
    font-size: 1.05rem;
    border-radius: var(--radius-sm);
  }

  .main-nav a:hover { background: var(--color-surface); }

  .header__cta { margin: 12px 0 0; width: 100%; }
  .header__right { flex-direction: column; align-items: stretch; width: 100%; }
  .lang-toggle { width: 100%; text-align: center; }
}

/* Skip link for accessibility */
.skip-link {
  position: absolute;
  left: -999px;
  top: 0;
  background: var(--color-primary);
  color: #fff;
  padding: 12px 20px;
  z-index: 200;
  border-radius: 0 0 var(--radius-sm) 0;
}
.skip-link:focus { left: 0; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 1rem;
  border-radius: var(--radius-pill);
  transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
  white-space: nowrap;
}

.btn--primary {
  background: var(--color-primary);
  color: var(--color-text-on-primary);
  box-shadow: 0 8px 20px -6px var(--color-primary);
}
.btn--primary:hover {
  background: var(--color-primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 12px 26px -6px var(--color-primary);
}

.btn--secondary {
  background: #fff;
  color: var(--color-secondary);
  border: 2px solid rgba(0,0,0,0.1);
}
.btn--secondary:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-2px);
}

.btn--ghost-light {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.5);
  backdrop-filter: blur(4px);
}
.btn--ghost-light:hover {
  background: rgba(255,255,255,0.28);
  transform: translateY(-2px);
}

.btn--lg { padding: 16px 36px; font-size: 1.08rem; }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  align-items: center;
  padding-top: var(--header-height);
  overflow: hidden;
  color: #fff;
}

.hero__bg {
  position: absolute;
  inset: 0;
  z-index: -2;
}
.hero__bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.hero__overlay {
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(115deg,
    rgba(0,0,0,0.82) 0%,
    rgba(0,0,0,0.55) 45%,
    rgba(0,0,0,0.25) 100%);
}

.hero__inner {
  max-width: 720px;
  padding-block: 60px;
}

.hero--centered {
  justify-content: center;
  text-align: center;
}
.hero--centered .hero__inner {
  max-width: 850px;
  margin-inline: auto;
}
.hero--centered .hero__lead {
  max-width: 650px;
  margin-inline: auto;
  margin-bottom: 32px;
}
.hero--centered .hero__actions {
  justify-content: center;
}
.hero--centered .hero__quick {
  justify-content: center;
}
.hero--centered .hero__overlay {
  background: linear-gradient(180deg,
    rgba(0,0,0,0.7) 0%,
    rgba(0,0,0,0.45) 40%,
    rgba(0,0,0,0.25) 100%);
}

.hero--full {
  min-height: 85vh;
}
.hero--full .hero__overlay {
  background: linear-gradient(180deg,
    rgba(0,0,0,0.15) 0%,
    rgba(0,0,0,0.1) 50%,
    rgba(0,0,0,0.75) 100%);
}
.hero--full .hero__inner {
  margin-top: auto;
  max-width: 800px;
  padding-bottom: 80px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}

.hero__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: var(--radius-pill);
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  backdrop-filter: blur(6px);
  margin-bottom: 24px;
}

.hero h1 {
  color: #fff;
  margin-bottom: 20px;
}
.hero h1 .accent { color: var(--color-accent); }

.hero__lead {
  font-size: 1.2rem;
  color: rgba(255,255,255,0.9);
  margin-bottom: 32px;
  max-width: 580px;
}

.hero__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 40px;
}

.hero__quick {
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
}
.hero__quick-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.9);
}

.scroll-cue {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.7);
  font-size: 0.8rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%,100% { transform: translate(-50%, 0); }
  50% { transform: translate(-50%, 8px); }
}

/* ---------- About badge (visible above-fold on some layouts) ---------- */
.about-media__badge {
  position: absolute;
  bottom: -24px;
  right: -16px;
  background: var(--color-primary);
  color: #fff;
  padding: 18px 26px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
}
.about-media__badge strong {
  display: block;
  font-family: var(--font-heading);
  font-size: 1.8rem;
  line-height: 1;
}
.about-media__badge span { font-size: 0.85rem; opacity: 0.9; }
